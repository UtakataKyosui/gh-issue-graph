name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: gh-issue-graph_linux_amd64
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: gh-issue-graph_darwin_amd64
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: gh-issue-graph_darwin_arm64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: gh-issue-graph_windows_amd64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gh-issue-graph gh-issue-graph
          tar czf dist/${{ matrix.asset_name }}.tar.gz gh-issue-graph
          rm gh-issue-graph

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/gh-issue-graph.exe gh-issue-graph.exe
          Compress-Archive -Path gh-issue-graph.exe -DestinationPath dist/${{ matrix.asset_name }}.zip
          Remove-Item gh-issue-graph.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}.${{ matrix.archive_ext }}
          generate_release_notes: true
